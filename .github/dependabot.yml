# Dependabot keeps dependencies — and the SHA-pinned GitHub Actions — current by
# opening update PRs. Pinning actions to a commit SHA (supply-chain hardening,
# MITRE T1195.001) is only safe to maintain with automated bump PRs; this file
# is the backbone for that across every ecosystem the repo uses.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Bumps the pinned action SHAs (keeps the "# vX" comment in sync).
    open-pull-requests-limit: 10

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
