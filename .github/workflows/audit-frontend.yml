name: Audit Frontend

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "47 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "25"

jobs:
  fe-install:
    name: fe-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci

  fe-lint:
    name: fe-lint
    runs-on: ubuntu-latest
    needs: fe-install
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: make audit:fe-lint
        run: make audit:fe-lint PS="pwsh -NoProfile -ExecutionPolicy Bypass"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: audit-frontend-lint
          path: |
            tests/baseline/phase*/*.txt
            tests/baseline/phase*/*.junit.xml
          if-no-files-found: ignore
          retention-days: 7

  fe-build:
    name: fe-build
    runs-on: ubuntu-latest
    needs: fe-install
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: make audit:fe-build
        run: make audit:fe-build PS="pwsh -NoProfile -ExecutionPolicy Bypass"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: audit-frontend-build
          path: |
            tests/baseline/phase*/*.txt
            tests/baseline/phase*/*.junit.xml
            frontend/dist/**
          if-no-files-found: ignore
          retention-days: 7

  fe-vitest:
    name: fe-vitest
    runs-on: ubuntu-latest
    needs: fe-install
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: make audit:test-fe
        run: make audit:test-fe PS="pwsh -NoProfile -ExecutionPolicy Bypass"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: audit-frontend-vitest
          path: |
            tests/baseline/phase*/*.txt
            tests/baseline/phase*/*.junit.xml
          if-no-files-found: ignore
          retention-days: 7

  fe-e2e:
    name: fe-e2e
    runs-on: ubuntu-latest
    needs: fe-install
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Restore Playwright browsers
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: npm ci
        working-directory: frontend
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e via local test server
        working-directory: frontend
        run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: audit-frontend-playwright
          path: |
            tests/baseline/phase6/playwright/**
            tests/baseline/phase6/playwright.junit.xml
            frontend/playwright-report/**
          if-no-files-found: ignore
          retention-days: 7

  accessibility:
    name: accessibility
    runs-on: ubuntu-latest
    needs: fe-install
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Restore Playwright browsers
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: npm ci
        working-directory: frontend
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Axe accessibility specs
        working-directory: frontend
        run: npx playwright test tests/e2e/a11y.spec.ts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: audit-frontend-accessibility
          path: |
            tests/baseline/phase6/a11y/**
            tests/baseline/phase6/playwright/**
            tests/baseline/phase6/playwright.junit.xml
          if-no-files-found: ignore
          retention-days: 7
