name: Release Solovey UI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: "v1.5.7-solovey.1"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "25"
  CRONET_GO_VERSION: "v148.0.7778.96-1"
  CRONET_GO_COMMIT: "e7f6f6f5b7ce226f686f6cb5d068a63da6657ccd"
  CRONET_GO_REPO: https://github.com/sagernet/cronet-go.git
  BOOTLIN_BASE_URL: https://toolchains.bootlin.com/downloads/releases/toolchains

jobs:
  test-installer:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Shell syntax
        run: bash -n install.sh solovey-ui.sh scripts/release-package-linux.sh scripts/server-smoke-debian.sh tests/installer/install-update.sh tests/installer/migrate-from-sui.sh tests/installer/rollback.sh tests/installer/release-package.sh tests/installer/manager-cookie-key.sh

      - name: release package integration
        run: bash tests/installer/release-package.sh

      - name: install/update integration
        run: bash tests/installer/install-update.sh

      - name: migrate-from-sui integration
        run: bash tests/installer/migrate-from-sui.sh

      - name: rollback integration
        run: bash tests/installer/rollback.sh

      - name: cookie key rotation integration
        run: bash tests/installer/manager-cookie-key.sh

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Strict, fail-closed install: a desynced package-lock.json aborts the
      # release here instead of silently shipping an unvalidated bundle.
      # `npm install` (lenient) previously masked a lockfile desync and shipped
      # an inconsistent dist with a dangling chunk -> 404 -> black screen
      # (v1.5.7-beta6). Mirror the same gates CI runs so a release can never
      # carry a frontend that CI would reject.
      - name: Install frontend dependencies (strict)
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-linux:
    name: Build-${{ matrix.platform }}
    needs:
      - build-frontend
      - test-installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: amd64, arch: amd64, bootlin: x86-64, naive: true }
          - { platform: arm64, arch: arm64, bootlin: aarch64, naive: true }
          - { platform: armv7, arch: arm, goarm: "7", bootlin: armv7-eabihf, naive: true }
          - { platform: armv6, arch: arm, goarm: "6", bootlin: armv6-eabihf, naive: true }
          - { platform: armv5, arch: arm, goarm: "5", bootlin: armv5-eabi, naive: false }
          - { platform: "386", arch: "386", bootlin: x86-i686, naive: true }
          - { platform: s390x, arch: s390x, bootlin: s390x-z13, naive: false }
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download frontend build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist
          path: web/html

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Clone cronet-go (naive platforms)
        if: matrix.naive
        run: |
          set -e
          git init ~/cronet-go
          git -C ~/cronet-go remote add origin ${{ env.CRONET_GO_REPO }}
          git -C ~/cronet-go fetch --depth=1 origin "${{ env.CRONET_GO_VERSION }}"
          git -C ~/cronet-go checkout FETCH_HEAD
          test "$(git -C ~/cronet-go rev-parse HEAD)" = "${{ env.CRONET_GO_COMMIT }}"
          git -C ~/cronet-go submodule update --init --recursive --depth=1

      - name: Regenerate Debian keyring (cronet sysroot)
        if: matrix.naive
        run: |
          set -e
          rm -f ~/cronet-go/naiveproxy/src/build/linux/sysroot_scripts/keyring.gpg
          cd ~/cronet-go
          GPG_TTY=/dev/null ./naiveproxy/src/build/linux/sysroot_scripts/generate_keyring.sh

      - name: Build cronet library and set toolchain environment
        if: matrix.naive
        run: |
          set -e
          cd ~/cronet-go
          go run ./cmd/build-naive --target=linux/${{ matrix.arch }} --libc=musl download-toolchain
          go run ./cmd/build-naive --target=linux/${{ matrix.arch }} --libc=musl env | while IFS= read -r line; do
            line="${line#export }"
            [[ -z "$line" ]] && continue
            echo "$line" >> $GITHUB_ENV
          done

      - name: Set Go build environment
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          echo "GOOS=linux" >> $GITHUB_ENV
          echo "GOARCH=${{ matrix.arch }}" >> $GITHUB_ENV
          if [ -n "${{ matrix.goarm }}" ]; then echo "GOARM=${{ matrix.goarm }}" >> $GITHUB_ENV; fi

      - name: Resolve build metadata
        id: build_meta
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PANEL_VERSION="${{ inputs.tag }}"
          else
            PANEL_VERSION="${GITHUB_REF_NAME}"
          fi
          case "$PANEL_VERSION" in
            v*) ;;
            *) PANEL_VERSION="v${PANEL_VERSION}" ;;
          esac
          SING_BOX_VERSION="$(go list -m -f '{{.Version}}' github.com/sagernet/sing-box)"
          [ -n "$SING_BOX_VERSION" ] || { echo "sing-box module version is empty" >&2; exit 1; }
          echo "panel_version=$PANEL_VERSION" >> "$GITHUB_OUTPUT"
          echo "sing_box_version=$SING_BOX_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Bootlin musl (non-naive platforms)
        if: ${{ matrix.naive != true }}
        run: |
          set -e
          BOOTLIN_ARCH="${{ matrix.bootlin }}"
          echo "Resolving Bootlin musl toolchain for arch=$BOOTLIN_ARCH (platform=${{ matrix.platform }})"
          TARBALL_BASE="${{ env.BOOTLIN_BASE_URL }}/$BOOTLIN_ARCH/tarballs/"
          TARBALL_URL=$(curl -fsSL "$TARBALL_BASE" | grep -oE "${BOOTLIN_ARCH}--musl--stable-[^\"]+\\.tar\\.xz" | sort -r | head -n1)
          [ -z "$TARBALL_URL" ] && { echo "Bootlin musl toolchain not found for arch=$BOOTLIN_ARCH" >&2; exit 1; }
          echo "Downloading: $TARBALL_URL"
          cd /tmp
          curl -fL -sS -o "$(basename "$TARBALL_URL")" "$TARBALL_BASE/$TARBALL_URL"
          tar -xf "$(basename "$TARBALL_URL")"
          TOOLCHAIN_DIR=$(find . -maxdepth 1 -type d -name "${BOOTLIN_ARCH}--musl--stable-*" | head -n1)
          TOOLCHAIN_DIR="$(realpath "$TOOLCHAIN_DIR")"
          BIN_DIR="$TOOLCHAIN_DIR/bin"
          echo "PATH=$BIN_DIR:$PATH" >> $GITHUB_ENV
          CC=$(find "$BIN_DIR" -maxdepth 1 \( -name '*-gcc.br_real' -o -name '*-gcc' \) -type f -executable 2>/dev/null | grep -v g++ | head -n1)
          [ -z "$CC" ] && { echo "gcc not found in $BIN_DIR" >&2; exit 1; }
          echo "CC=$(realpath "$CC")" >> $GITHUB_ENV
          SYSROOT=""
          F=$(find "$TOOLCHAIN_DIR" -name "libc-header-start.h" 2>/dev/null | head -1)
          if [ -n "$F" ]; then SYSROOT=$(dirname "$(dirname "$(dirname "$(dirname "$F")")")"); fi
          if [ -n "$SYSROOT" ] && [ -d "$SYSROOT" ]; then
            echo "CGO_CFLAGS=--sysroot=$SYSROOT" >> $GITHUB_ENV
            echo "CGO_LDFLAGS=--sysroot=$SYSROOT -static" >> $GITHUB_ENV
          fi

      - name: Build Solovey UI
        run: |
          set -e
          BUILD_TAGS="with_quic,with_grpc,with_utls,with_acme,with_gvisor,badlinkname,tfogo_checklinkname0,with_tailscale"
          [ "${{ matrix.naive }}" = "true" ] && BUILD_TAGS="${BUILD_TAGS},with_naive_outbound,with_musl"
          go build -ldflags="-w -s -checklinkname=0 -linkmode external -extldflags '-static' -X github.com/MalenkiySolovey/solovey-ui/config/update.ArtifactPlatform=${{ matrix.platform }}" -tags "$BUILD_TAGS" -o solovey-ui main.go
          file solovey-ui
          ldd solovey-ui 2>/dev/null || echo "Static binary confirmed"
          {
            echo "app=solovey-ui"
            echo "version=${{ steps.build_meta.outputs.panel_version }}"
            echo "commit=${GITHUB_SHA}"
            echo "platform=linux/${{ matrix.platform }}"
            echo "go=$(go version)"
            echo "sing_box=${{ steps.build_meta.outputs.sing_box_version }}"
          } > BUILD_INFO.txt

      - name: Package
        run: |
          bash scripts/release-package-linux.sh \
            --target linux-${{ matrix.platform }} \
            --binary ./solovey-ui \
            --manager ./solovey-ui.sh \
            --service ./solovey-ui.service \
            --build-info ./BUILD_INFO.txt \
            --out-dir .

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: solovey-ui-linux-${{ matrix.platform }}
          path: |
            ./solovey-ui-linux-${{ matrix.platform }}.tar.gz
            ./solovey-ui-linux-${{ matrix.platform }}.tar.gz.sha256
          retention-days: 1

  publish-linux:
    name: Publish Linux artifacts
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (for release notes)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Normalize release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*) echo "tag=$TAG" >> "$GITHUB_OUTPUT" ;;
            *) TAG="v$TAG"; echo "tag=$TAG" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          case "$TAG" in
            *-alpha*|*-beta*|*-rc*|*-pre*) echo "prerelease=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac
          NOTES_FILE=".github/RELEASE_NOTES_${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "notes_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "notes_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Linux build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: solovey-ui-linux-*
          path: release-assets
          merge-multiple: true

      - name: Publish to current repository Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Solovey UI ${{ steps.vars.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.vars.outputs.prerelease == 'true' }}
          body_path: ${{ steps.vars.outputs.notes_path }}
          fail_on_unmatched_files: true
          files: release-assets/*
