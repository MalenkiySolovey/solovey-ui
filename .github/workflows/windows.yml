name: Build Solovey UI for Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: "v1.5.7-solovey.1"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "25"
  TAGS: "with_quic,with_grpc,with_utls,with_acme,with_gvisor,with_naive_outbound,with_purego,badlinkname,tfogo_checklinkname0,with_tailscale"
  LIBCRONET_BASE_URL: "https://github.com/SagerNet/cronet-go/releases/download/v148.0.7778.96-1"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-windows:
    needs: build-frontend
    name: Build-windows-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: windows-latest, cgo: "1" }
          - { arch: arm64, runner: ubuntu-latest, cgo: "0" }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download frontend build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist
          path: web/html

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Build Solovey UI
        shell: bash
        run: |
          export CGO_ENABLED=${{ matrix.cgo }}
          export GOOS=windows
          export GOARCH=${{ matrix.arch }}

          echo "Building for Windows ${{ matrix.arch }}"
          go version
          go env GOOS GOARCH

          go build -ldflags="-w -s -checklinkname=0" -tags "${{ env.TAGS }}" -o solovey-ui.exe main.go
          file solovey-ui.exe

          mkdir solovey-ui-windows
          cp solovey-ui.exe solovey-ui-windows/
          cp -r windows/* solovey-ui-windows/

      - name: Download libcronet-go
        shell: bash
        run: |
          case "${{ matrix.arch }}" in
            amd64) CRONET_SHA256="c7434cfa93c3041321dd19111c4de6c52b8a9531a65661ba45425d3c51ec69e2" ;;
            arm64) CRONET_SHA256="fc9e3bae0b326d83092a5de2c04d8b4139dc5c1ba576a035dee4bde780a3c95f" ;;
            *) echo "no pinned libcronet sha256 for arch ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          curl --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 --connect-timeout 20 --retry 3 --retry-all-errors \
            -o solovey-ui-windows/libcronet.dll \
            ${{ env.LIBCRONET_BASE_URL }}/libcronet-windows-${{ matrix.arch }}.dll
          echo "${CRONET_SHA256}  solovey-ui-windows/libcronet.dll" | sha256sum -c -

      - name: Package on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive `
            -Path solovey-ui-windows `
            -DestinationPath "solovey-ui-windows-${{ matrix.arch }}.zip" `
            -CompressionLevel Optimal `
            -Force

      - name: Package on Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zip -r "solovey-ui-windows-${{ matrix.arch }}.zip" solovey-ui-windows

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: solovey-ui-windows-${{ matrix.arch }}
          path: ./solovey-ui-windows-${{ matrix.arch }}.zip
          retention-days: 1

  publish-windows:
    name: Publish Windows artifacts
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Normalize release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*) echo "tag=$TAG" >> "$GITHUB_OUTPUT" ;;
            *) echo "tag=v$TAG" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Download Windows build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: solovey-ui-windows-*
          path: release-assets
          merge-multiple: true

      - name: Publish to current repository Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Solovey UI ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: release-assets/*
