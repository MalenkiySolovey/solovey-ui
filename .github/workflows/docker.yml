name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: "v2026.1.0"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build-${{ matrix.platform_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform_name: amd64, platform: linux/amd64, runner: ubuntu-24.04 }
          - { platform_name: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*) echo "tag=$TAG" >> "$GITHUB_OUTPUT" ;;
            *) echo "tag=v$TAG" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Normalize image name
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ steps.image.outputs.name }}
          cache-from: type=gha,scope=docker-${{ matrix.platform_name }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.platform_name }}

      - name: Export image digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-digest-${{ matrix.platform_name }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: publish-manifest
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*) echo "tag=$TAG" >> "$GITHUB_OUTPUT" ;;
            *) echo "tag=v$TAG" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Normalize image name
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: docker-digest-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Create and push multi-platform manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -e
          DIGESTS=""
          for digest_file in *; do
            [ -f "$digest_file" ] || continue
            DIGESTS="${DIGESTS} ${{ steps.image.outputs.name }}@sha256:${digest_file}"
          done
          [ -n "$DIGESTS" ] || { echo "no image digests were downloaded" >&2; exit 1; }
          docker buildx imagetools create \
            -t "${{ steps.image.outputs.name }}:${{ steps.vars.outputs.tag }}" \
            -t "${{ steps.image.outputs.name }}:latest" \
            $DIGESTS
